  <text x="80" y="506" font-family="'Inter',Helvetica,Arial,sans-serif" font-size="11" fill="#94A3B8">Convergence: many traffic types → one gateway node → unified flow</text>

  <!-- color palette -->
  <text x="568" y="352" font-family="'Inter',Helvetica,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#94A3B8">PALETTE</text>
  <rect x="568" y="368" width="284" height="150" rx="14" fill="#ffffff" stroke="#E2E8F0"/>
  <g font-family="'Inter',Helvetica,Arial,sans-serif">
