    <rect x="664" y="390" width="56" height="56" rx="12" fill="#14B8A6"/>
    <text x="664" y="464" font-size="10" font-weight="700" fill="#0F172A">Flow Teal</text>
    <text x="664" y="478" font-size="9.5" fill="#64748B">#14B8A6</text>

    <rect x="740" y="390" width="56" height="56" rx="12" fill="#0F172A"/>
    <text x="740" y="464" font-size="10" font-weight="700" fill="#0F172A">Ink</text>
    <text x="740" y="478" font-size="9.5" fill="#64748B">#0F172A</text>
  </g>

  <!-- footer note -->
  <line x1="48" y1="556" x2="852" y2="556" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="48" y="586" font-family="'Inter',Helvetica,Arial,sans-serif" font-size="12" fill="#475569">Wordmark shown in Poppins / Inter (700). For production, outline the text so it renders identically everywhere.</text>
  <text x="48" y="608" font-family="'Inter',Helvetica,Arial,sans-serif" font-size="12" fill="#475569">All files are vector SVG — infinitely scalable, editable in Figma / Illustrator.</text>
