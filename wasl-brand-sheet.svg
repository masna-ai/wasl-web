    <g fill="none" stroke="#fff" stroke-linecap="round" transform="scale(0.3)">
      <path d="M16,28 C42,28 46,56 68,56" stroke-width="11" opacity="0.95"/>
      <path d="M16,44 C42,44 50,56 68,56" stroke-width="11" opacity="0.78"/>
      <path d="M16,68 C42,68 50,56 68,56" stroke-width="11" opacity="0.78"/>
      <path d="M16,84 C42,84 46,56 68,56" stroke-width="11" opacity="0.95"/>
