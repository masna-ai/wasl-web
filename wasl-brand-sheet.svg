  <text x="48" y="86" font-family="'Inter',Helvetica,Arial,sans-serif" font-size="13" fill="#64748B">وصل · "to connect" — One gateway. Every kind of traffic.</text>
  <line x1="48" y1="104" x2="852" y2="104" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- primary light card -->
  <rect x="48" y="128" width="500" height="180" rx="14" fill="#ffffff" stroke="#E2E8F0"/>
  <g transform="translate(78,178)">
    <rect x="0" y="0" width="88" height="88" rx="24" fill="url(#g)"/>
    <g fill="none" stroke="#ffffff" stroke-linecap="round" transform="scale(0.785)">
      <path d="M16,28 C42,28 46,56 68,56" stroke-width="7.6" opacity="0.95"/>
      <path d="M16,44 C42,44 50,56 68,56" stroke-width="7.6" opacity="0.78"/>
      <path d="M16,68 C42,68 50,56 68,56" stroke-width="7.6" opacity="0.78"/>
