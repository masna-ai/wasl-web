    <text x="108" y="48" font-family="'Poppins','Inter',Helvetica,Arial,sans-serif" font-size="46" font-weight="700" letter-spacing="-1"><tspan fill="url(#g)">W</tspan><tspan fill="#0F172A">asl</tspan></text>
    <text x="110" y="72" font-family="'Inter',Helvetica,Arial,sans-serif" font-size="10" font-weight="600" letter-spacing="2" fill="#64748B">ONE GATEWAY · EVERY KIND OF TRAFFIC</text>
  </g>

