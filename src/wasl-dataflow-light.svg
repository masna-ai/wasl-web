<svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="waslFlowTitleL waslFlowDescL" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <title id="waslFlowTitleL">WASL request lifecycle — one gateway for API, AI, event, and worker traffic</title>
  <desc id="waslFlowDescL">A tenant request flows through the WASL data-plane runtime's fixed policy pipeline — authentication, rate limiting, routing, guardrails, flows, and trace capture — before reaching backends and LLM providers. The Studio control plane authors, deploys, and observes through an outbound-only separated runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0EA5A4"/>
    </marker>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1200" height="600" rx="18" fill="url(#bg)"/>

  <text x="48" y="44" font-size="12" font-weight="700" letter-spacing="2.5" fill="#0D9488">REQUEST LIFECYCLE</text>
  <text x="1152" y="44" text-anchor="end" font-size="12" font-weight="700" letter-spacing="2.5" fill="#94A3B8">SEPARATED RUNTIME · OUTBOUND-ONLY</text>

  <!-- PostgreSQL -->
  <g filter="url(#soft)"><rect x="60" y="74" width="250" height="92" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/></g>
  <circle cx="86" cy="104" r="5" fill="#3B82F6"/>
  <text x="102" y="108" font-size="16" font-weight="700" fill="#0F172A">Configuration store</text>
  <text x="84" y="134" font-size="12.5" fill="#475569">Authoritative deployments</text>
  <text x="84" y="152" font-size="11" fill="#94A3B8">policies · revisions · tenants</text>

  <!-- Studio -->
  <g filter="url(#soft)"><rect x="430" y="60" width="340" height="106" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/></g>
  <text x="452" y="92" font-size="11" font-weight="700" letter-spacing="2" fill="#0D9488">STUDIO · CONTROL PLANE</text>
  <text x="452" y="120" font-size="19" font-weight="700" fill="#0F172A">Author · Deploy · Observe</text>
  <g font-size="11.5" fill="#475569">
    <rect x="452" y="134" width="86" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="495" y="149" text-anchor="middle">Bundles</text>
    <rect x="548" y="134" width="86" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="591" y="149" text-anchor="middle">Policies</text>
    <rect x="644" y="134" width="104" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="696" y="149" text-anchor="middle">Traces</text>
  </g>

  <!-- Redis -->
  <g filter="url(#soft)"><rect x="890" y="74" width="250" height="92" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/></g>
  <circle cx="916" cy="104" r="5" fill="#14B8A6"/>
  <text x="932" y="108" font-size="16" font-weight="700" fill="#0F172A">Coordination cache</text>
  <text x="914" y="134" font-size="12.5" fill="#475569">Cluster state</text>
  <text x="914" y="152" font-size="11" fill="#94A3B8">coordination · cache · health</text>

  <line x1="430" y1="120" x2="310" y2="120" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 4" marker-end="url(#arrS)"/>
  <line x1="770" y1="120" x2="890" y2="120" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 4" marker-end="url(#arrS)"/>
  <text x="370" y="112" text-anchor="middle" font-size="10" fill="#94A3B8">writes</text>
  <text x="830" y="112" text-anchor="middle" font-size="10" fill="#94A3B8">writes</text>

  <line x1="500" y1="166" x2="500" y2="300" stroke="#CBD5E1" stroke-width="1.6" stroke-dasharray="2 5" marker-end="url(#arrS)"/>
  <text x="492" y="240" text-anchor="end" font-size="11" fill="#475569">pull desired state</text>
  <text x="492" y="256" text-anchor="end" font-size="10" fill="#94A3B8">runtime polls outbound</text>

  <line x1="700" y1="300" x2="700" y2="166" stroke="#CBD5E1" stroke-width="1.6" stroke-dasharray="2 5" marker-end="url(#arrS)"/>
  <text x="708" y="240" font-size="11" fill="#475569">traces · health</text>
  <text x="708" y="256" font-size="10" fill="#94A3B8">observability stream</text>

  <!-- Tenant -->
  <g filter="url(#soft)"><rect x="40" y="345" width="252" height="120" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/></g>
  <text x="62" y="377" font-size="11" font-weight="700" letter-spacing="2" fill="#0D9488">TENANT REQUEST</text>
  <text x="62" y="406" font-size="19" font-weight="700" fill="#0F172A">acme.example.com</text>
  <g font-size="10.5" fill="#475569">
    <rect x="62" y="422" width="44" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="84" y="437" text-anchor="middle">REST</text>
    <rect x="112" y="422" width="44" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="134" y="437" text-anchor="middle">gRPC</text>
    <rect x="162" y="422" width="40" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="182" y="437" text-anchor="middle">WS</text>
    <rect x="208" y="422" width="40" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="228" y="437" text-anchor="middle">SSE</text>
  </g>

  <!-- Runtime -->
  <g filter="url(#soft)"><rect x="330" y="300" width="540" height="210" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/></g>
  <text x="356" y="334" font-size="11" font-weight="700" letter-spacing="2" fill="#0D9488">DATA PLANE RUNTIME</text>
  <g font-size="11" fill="#0F766E">
    <rect x="356" y="346" width="52" height="22" rx="11" fill="#ECFDF5" stroke="#99F6E4"/><text x="382" y="361" text-anchor="middle">API</text>
    <rect x="414" y="346" width="46" height="22" rx="11" fill="#ECFDF5" stroke="#99F6E4"/><text x="437" y="361" text-anchor="middle">AI</text>
    <rect x="466" y="346" width="64" height="22" rx="11" fill="#ECFDF5" stroke="#99F6E4"/><text x="498" y="361" text-anchor="middle">Event</text>
    <rect x="536" y="346" width="70" height="22" rx="11" fill="#ECFDF5" stroke="#99F6E4"/><text x="571" y="361" text-anchor="middle">Worker</text>
  </g>
  <text x="844" y="362" text-anchor="end" font-size="10.5" fill="#94A3B8">one fixed pipeline · every request</text>

  <line x1="372" y1="425" x2="828" y2="425" stroke="url(#rail)" stroke-width="4" stroke-linecap="round"/>
  <g font-size="11.5" font-weight="600" fill="#334155">
    <circle cx="372" cy="425" r="7" fill="#FFFFFF" stroke="url(#rail)" stroke-width="3"/><text x="372" y="455" text-anchor="middle">Auth</text>
    <circle cx="463" cy="425" r="7" fill="#FFFFFF" stroke="url(#rail)" stroke-width="3"/><text x="463" y="455" text-anchor="middle">Rate limit</text>
    <circle cx="554" cy="425" r="7" fill="#FFFFFF" stroke="url(#rail)" stroke-width="3"/><text x="554" y="455" text-anchor="middle">Routing</text>
    <circle cx="646" cy="425" r="7" fill="#FFFFFF" stroke="url(#rail)" stroke-width="3"/><text x="646" y="455" text-anchor="middle">Guardrail</text>
    <circle cx="737" cy="425" r="7" fill="#FFFFFF" stroke="url(#rail)" stroke-width="3"/><text x="737" y="455" text-anchor="middle">Flow</text>
    <circle cx="828" cy="425" r="7" fill="#FFFFFF" stroke="url(#rail)" stroke-width="3"/><text x="828" y="455" text-anchor="middle">Trace</text>
  </g>
  <text x="600" y="490" text-anchor="middle" font-size="10.5" fill="#94A3B8">JavaScript flows · 24 built-in policies · trace capture on every hop</text>

  <!-- Plugin layer -->
  <g filter="url(#soft)"><rect x="908" y="320" width="252" height="170" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/></g>
  <text x="930" y="352" font-size="11" font-weight="700" letter-spacing="2" fill="#0D9488">PLUGIN LAYER</text>
  <text x="930" y="375" font-size="14.5" font-weight="700" fill="#0F172A">Backends + LLM providers</text>
  <g font-size="11" fill="#475569">
    <rect x="930" y="388" width="92" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="976" y="403" text-anchor="middle">Database</text>
    <rect x="1028" y="388" width="104" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="1080" y="403" text-anchor="middle">Queue / Bus</text>
    <rect x="930" y="416" width="110" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="985" y="431" text-anchor="middle">Object store</text>
    <rect x="1046" y="416" width="86" height="22" rx="11" fill="#F1F5F9" stroke="#E2E8F0"/><text x="1089" y="431" text-anchor="middle">SaaS API</text>
    <rect x="930" y="444" width="202" height="22" rx="11" fill="#F0FDFA" stroke="#99F6E4"/><text x="1031" y="459" text-anchor="middle" fill="#0D9488">LLM provider · fallback loop</text>
  </g>

  <!-- request flow -->
  <line x1="292" y1="425" x2="366" y2="425" stroke="url(#flow)" stroke-width="3" marker-end="url(#arr)"/>
  <text x="329" y="415" text-anchor="middle" font-size="10" fill="#0EA5A4">TLS · mTLS</text>
  <line x1="834" y1="425" x2="904" y2="425" stroke="url(#flow)" stroke-width="3" marker-end="url(#arr)"/>
  <text x="869" y="415" text-anchor="middle" font-size="10" fill="#0EA5A4">signed</text>

  <circle r="4" fill="#0EA5E9"><animateMotion dur="1.6s" repeatCount="indefinite" path="M292,425 L366,425"/></circle>
  <circle r="4.5" fill="#14B8A6"><animateMotion dur="2.6s" repeatCount="indefinite" path="M372,425 L828,425"/></circle>
  <circle r="4.5" fill="#14B8A6"><animateMotion dur="2.6s" begin="1.3s" repeatCount="indefinite" path="M372,425 L828,425"/></circle>
  <circle r="4" fill="#0EA5E9"><animateMotion dur="1.6s" begin="0.4s" repeatCount="indefinite" path="M834,425 L904,425"/></circle>

  <g font-size="11" fill="#475569">
    <line x1="60" y1="560" x2="92" y2="560" stroke="url(#flow)" stroke-width="3"/>
    <text x="100" y="564">Request &amp; response path</text>
    <line x1="280" y1="560" x2="312" y2="560" stroke="#CBD5E1" stroke-width="1.6" stroke-dasharray="2 5"/>
    <text x="320" y="564">Control plane &amp; state (outbound-only)</text>
    <text x="1152" y="564" text-anchor="end" fill="#94A3B8">Studio never reaches into the data plane</text>
  </g>
</svg>
