<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="wt" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.80" cy="0.32" r="0.42">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.14" cy="0.70" r="0.42">
      <stop offset="0" stop-color="#14B8A6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop (full square; the middle 630 band is the exported frame) -->
  <rect width="1200" height="1200" fill="#0B1220"/>
  <rect width="1200" height="1200" fill="url(#glowA)"/>
  <rect width="1200" height="1200" fill="url(#glowB)"/>

  <!-- design content, centered in the 1200 square so a centred crop to 630 lands exactly -->
  <g transform="translate(0,285)">
    <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- mark + wordmark -->
    <g transform="translate(90,72) scale(1.2)">
      <rect width="90" height="90" rx="24" fill="url(#wm)"/>
      <g fill="none" stroke="#ffffff" stroke-linecap="round" transform="scale(0.75)">
        <path d="M16,28 C42,28 46,56 68,56" stroke-width="8" opacity="0.95"/>
        <path d="M16,44 C42,44 50,56 68,56" stroke-width="8" opacity="0.78"/>
        <path d="M16,68 C42,68 50,56 68,56" stroke-width="8" opacity="0.78"/>
        <path d="M16,84 C42,84 46,56 68,56" stroke-width="8" opacity="0.95"/>
        <path d="M68,56 L96,56" stroke-width="12"/>
      </g>
      <circle cx="51" cy="42" r="8.2" fill="#ffffff"/>
      <circle cx="51" cy="42" r="3.7" fill="url(#wm)"/>
    </g>
    <text x="226" y="155" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" letter-spacing="-1"><tspan fill="url(#wt)">W</tspan><tspan fill="#F1F5F9">asl</tspan></text>

    <!-- kicker -->
    <text x="92" y="258" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="21" font-weight="700" letter-spacing="4" fill="#2DD4BF">UNIFIED GATEWAY PLATFORM</text>

    <!-- headline -->
    <text x="86" y="350" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="70" font-weight="700" letter-spacing="-2" fill="#F1F5F9">One gateway.</text>
    <text x="86" y="436" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="70" font-weight="700" letter-spacing="-2" fill="url(#wt)">Every kind of traffic.</text>

    <!-- gradient rule -->
    <rect x="90" y="486" width="320" height="4" rx="2" fill="url(#wt)"/>

    <!-- subline -->
    <text x="90" y="544" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="29" font-weight="500" fill="#94A3B8">API · AI · Events · Integrations · Plugins</text>

    <!-- url -->
    <text x="1110" y="588" text-anchor="end" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="600" fill="#64748B">waslhq.com</text>
  </g>
</svg>
